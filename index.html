<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 묵상 뽑기</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* 3D 효과를 위한 컨테이너 */
        .card-container {
            width: 240px;
            height: 380px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* 카드 자체 */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* 뒤집기 상태 클래스 */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* 앞면과 뒷면 공통 스타일 */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 카드 뒷면 (터치 전) */
        .card-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 6px solid white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-back .pattern {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .card-back p {
            margin: 0;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* 카드 앞면 */
        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
        }

        /* 결과 이미지 스타일 */
        #result-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 다시 뽑기 버튼 */
        .reset-btn {
            margin-top: 35px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #764ba2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.3);
            transition: all 0.2s ease;
            display: none;
        }

        .reset-btn:hover {
            background-color: #5a3782;
            transform: translateY(-2px);
        }

        /* ==========================================
           새로 추가된 스타일: 이미지 확대 모달(Popup)
           ========================================== */
        .modal {
            display: none; /* 기본적으로는 숨김 */
            position: fixed;
            z-index: 999; /* 화면 최상단에 위치 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 배경 어둡게 */
            justify-content: center;
            align-items: center;
            cursor: zoom-out; /* 닫을 수 있다는 직관적인 마우스 포인터 */
        }

        /* 모달 안의 확대된 이미지 */
        .modal-content {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 15px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease-out; /* 부드럽게 커지는 애니메이션 */
        }

        /* 부드럽게 커지는 애니메이션 정의 */
        @keyframes zoomIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 이미지 확대 전용 가이드 문구 */
        .zoom-tip {
            font-size: 13px;
            color: #888;
            margin-top: 10px;
            display: none; /* 뒤집히기 전엔 숨김 */
        }
    </style>
</head>
<body>

    <h1>🔮 오늘의 말씀 묵상 🔮</h1>

    <div class="card-container" id="cardContainer" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-back">
                <div class="pattern">✨</div>
                <p>터치하여 뽑기</p>
            </div>
            <div class="card-face card-front">
                <img id="result-img" src="" alt="운세 결과 카드" onclick="openModal(event)">
            </div>
        </div>
    </div>

    <p class="zoom-tip" id="zoomTip">🔍 카드를 누르면 크게 확대하여 볼 수 있습니다.</p>

    <button class="reset-btn" id="resetBtn" onclick="resetCard()">다시 뽑기 🔄</button>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <img class="modal-content" id="modal-img" alt="확대된 이미지">
    </div>

    <script>
        const fortuneImages = [
            "./card01.png",
            "./card02.png",
            "./card03.png",
            "./card04.png",
            "./card05.png"
        ];

        let isFlipped = false;

        // 1. 카드 뒤집기 함수
        function flipCard() {
            if (isFlipped) return; // 이미 뒤집힌 상태면 무시
            
            const card = document.getElementById('card');
            
            // 랜덤 이미지 지정
            const randomIndex = Math.floor(Math.random() * fortuneImages.length);
            const selectedImage = fortuneImages[randomIndex];
            document.getElementById('result-img').src = selectedImage;

            // 회전 애니메이션
            card.classList.add('is-flipped');
            isFlipped = true;

            // 다시 뽑기 버튼 및 안내 문구 나타내기
            setTimeout(() => {
                document.getElementById('resetBtn').style.display = 'block';
                document.getElementById('zoomTip').style.display = 'block';
            }, 600);
        }

        // 2. [신규] 이미지 확대 모달 열기 함수
        function openModal(event) {
            // 이 버튼을 눌렀을 때 부모 요소인 cardContainer의 'flipCard' 클릭 이벤트가 중복 실행되는 것을 방지합니다.
            event.stopPropagation(); 
            
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("modal-img");
            const resultImg = document.getElementById("result-img");

            modal.style.display = "flex";
            modalImg.src = resultImg.src; // 현재 결과 카드의 이미지 경로를 확대 모달로 복사
        }

        // 3. [신규] 이미지 확대 모달 닫기 함수
        function closeModal() {
            const modal = document.getElementById("imageModal");
            modal.style.display = "none";
        }

        // 4. 초기화 함수
        function resetCard() {
            const card = document.getElementById('card');
            card.classList.remove('is-flipped');
            isFlipped = false;
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('zoomTip').style.display = 'none';
        }
    </script>
</body>
</html>
